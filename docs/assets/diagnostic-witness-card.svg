<svg width="1160" height="640" viewBox="0 0 1160 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lean UFO missing witness diagnostic card</title>
  <desc id="desc">A diagnostic card showing a failed witness obligation for Alice, with the missing requirements listed explicitly.</desc>
  <rect width="1160" height="640" rx="24" fill="#0f172a"/>
  <rect x="36" y="36" width="1088" height="568" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>

  <text x="72" y="88" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700">Lean UFO certification diagnostic</text>
  <rect x="830" y="58" width="234" height="42" rx="21" fill="#3f1d1d" stroke="#f97316" stroke-width="1.5"/>
  <text x="858" y="86" fill="#fed7aa" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">witness obligation</text>

  <rect x="72" y="126" width="1016" height="92" rx="14" fill="#1e293b" stroke="#475569"/>
  <text x="104" y="164" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800">Counterexample 1</text>
  <text x="104" y="196" fill="#cbd5e1" font-family="JetBrains Mono, Menlo, monospace" font-size="22">k = Person, x = Alice, w = actual.</text>

  <rect x="72" y="250" width="1016" height="276" rx="14" fill="#171f2f" stroke="#475569"/>
  <rect x="104" y="282" width="232" height="40" rx="20" fill="#7f1d1d"/>
  <text x="126" y="308" fill="#fee2e2" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="800">FAILED CONDITION</text>

  <text x="104" y="364" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700">Missing witness requirements</text>

  <rect x="104" y="394" width="470" height="38" rx="9" fill="#0f172a" stroke="#334155"/>
  <text x="124" y="419" fill="#e2e8f0" font-family="JetBrains Mono, Menlo, monospace" font-size="19">[actual] Kind(AlternateKind)</text>

  <rect x="104" y="446" width="520" height="38" rx="9" fill="#0f172a" stroke="#334155"/>
  <text x="124" y="471" fill="#e2e8f0" font-family="JetBrains Mono, Menlo, monospace" font-size="19">[actual] Alice :: AlternateKind</text>

  <rect x="104" y="498" width="500" height="38" rx="9" fill="#0f172a" stroke="#334155"/>
  <text x="124" y="523" fill="#e2e8f0" font-family="JetBrains Mono, Menlo, monospace" font-size="19">not (AlternateKind = Person)</text>

  <text x="674" y="364" fill="#f8fafc" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700">Evidence that triggered it</text>
  <rect x="674" y="394" width="334" height="38" rx="9" fill="#0f172a" stroke="#334155"/>
  <text x="694" y="419" fill="#e2e8f0" font-family="JetBrains Mono, Menlo, monospace" font-size="19">[actual] Kind(Person)</text>
  <rect x="674" y="446" width="334" height="38" rx="9" fill="#0f172a" stroke="#334155"/>
  <text x="694" y="471" fill="#e2e8f0" font-family="JetBrains Mono, Menlo, monospace" font-size="19">[actual] Alice :: Person</text>

  <rect x="72" y="552" width="1016" height="1" fill="#334155"/>
  <text x="104" y="586" fill="#a7f3d0" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">Repair direction</text>
  <text x="280" y="586" fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-size="20">Add a valid witness, or change the facts that make this obligation apply.</text>
</svg>
